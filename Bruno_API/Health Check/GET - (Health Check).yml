info:
  name: GET / (Health Check)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Server is running', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Response has correct structure', function () {
            const json = res.getBody();
            expect(json.message).to.eql('GetSmart API');
            expect(json.timestamp).to.be.a('string');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Cek apakah server berjalan dan API key valid.
