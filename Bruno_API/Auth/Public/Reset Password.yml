info:
  name: Reset Password
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/auth/reset-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "{{resetToken}}",
        "newPassword": "newpassword123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Reset password berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
            expect(json.message).to.include('Password berhasil direset');
        });

        // ✅ Clear resetToken setelah berhasil
        if (res.getStatus() === 200) {
            bru.setVar('resetToken', '');
            console.log('🧹 resetToken cleared. Silakan login dengan password baru.');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Set password baru setelah verifikasi forgot password.

  **Required fields:**
  - `token`: Reset token dari "Forgot Password - Verify" (auto-captured ke `{{resetToken}}`)
  - `newPassword`: Password baru (minimal 8 karakter)

  **Note:**
  - Semua refresh token user akan di-invalidasi setelah reset password (security measure).
  - User harus login ulang dengan password baru.
  - `resetToken` expire dalam 15 menit.
