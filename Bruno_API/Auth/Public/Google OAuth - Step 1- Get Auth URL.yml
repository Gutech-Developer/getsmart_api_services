info:
  name: "Google OAuth - Step 1: Get Auth URL"
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/auth/google/url?redirectUri=http://localhost:3000/auth/callback"
  params:
    - name: redirectUri
      value: http://localhost:3000/auth/callback
      type: query
      description: URL callback setelah user login di Google
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Get Google Auth URL berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            const json = res.getBody();
            expect(json.success).to.be.true;
            expect(json.data.url).to.include('accounts.google.com');
        });

        test('URL contains required scopes', function () {
            const json = res.getBody();
            const url = json.data.url;
            expect(url).to.include('scope=');
            expect(url).to.include('response_type=code');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Step 1 - Authorization Code Flow**

  Mendapatkan Google OAuth consent URL.

  **Flow:**
  1. Hit endpoint ini → dapat Google consent URL
  2. Buka URL di browser → login Google
  3. Google redirect ke `redirectUri` dengan `?code=...`
  4. Copy `code` parameter dari URL redirect
  5. Paste ke request "Google OAuth - Step 2: Callback"

  **Query Parameters:**
  - `redirectUri` (required): URL callback frontend
