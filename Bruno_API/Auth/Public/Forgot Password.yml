info:
  name: Forgot Password
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/auth/forgot-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "siswa1@test.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Forgot password request berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Request reset password via email.

  **Required fields:** email

  **Flow:**
  1. Hit endpoint ini → email berisi link reset password dikirim
  2. User klik link dari email → hit "Forgot Password - Verify"
  3. Dapat `resetToken` → hit "Reset Password" dengan password baru

  **Note:** Response selalu 200 (silent fail jika email tidak ditemukan, untuk keamanan).
  Error jika akun belum aktif atau akun Google-only.
