info:
  name: Activation - Resend
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/auth/activation/resend"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "siswa1@test.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Resend activation berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Kirim ulang email aktivasi untuk akun yang belum aktif.

  **Required fields:** email

  **Note:** Response selalu 200 (silent fail jika email tidak ditemukan, untuk keamanan).
  Akan error 400 jika akun sudah aktif.
