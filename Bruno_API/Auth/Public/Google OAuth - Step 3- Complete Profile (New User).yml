info:
  name: "Google OAuth - Step 3: Complete Profile (New User)"
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/auth/google/complete-profile"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "tempToken": "{{tempToken}}",
        "role": "STUDENT",
        "fullName": "Google User",
        "phoneNumber": "081234567890",
        "NIS": "2024001",
        "province": "Aceh",
        "city": "Banda Aceh",
        "schoolId": "",
        "schoolName": "SMA Negeri 1 Banda Aceh"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Complete Profile berhasil (201)', function () {
            expect(res.getStatus()).to.equal(201);
            expect(json.success).to.be.true;
            expect(json.message).to.eql('Registrasi via Google berhasil');
        });

        // ✅ Auto-capture tokens
        if (json.success && json.data && json.data.tokens) {
            bru.setVar('accessToken', json.data.tokens.accessToken)
            bru.setVar('refreshToken', json.data.tokens.refreshToken)
            console.log('✅ accessToken & refreshToken tersimpan otomatis!');
            
            if (json.data.user) {
              bru.setVar('currentUserId', json.data.user.id);
              bru.setVar('currentUserEmail', json.data.user.email);
              console.log('✅ userId & userEmail tersimpan: ' + json.data.user.email);
            }
            
            // Clear tempToken setelah berhasil digunakan
            bru.setVar('tempToken', '');
            console.log('🧹 tempToken cleared');
        }

        test('Response contains user data', function () {
            expect(json.data.user).to.have.property('id');
            expect(json.data.user).to.have.property('email');
        });

        test('Response contains tokens', function () {
            expect(json.data.tokens).to.have.property('accessToken');
            expect(json.data.tokens).to.have.property('refreshToken');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  **Step 3 - Authorization Code Flow (hanya untuk user baru)**

  Melengkapi profil user baru yang login via Google.
  Data email, name, googleId diambil dari `tempToken` (signed JWT dari server) → BUKAN dari input frontend.

  **Request Body:**
  - `tempToken` (required): Token dari Step 2 (auto-captured ke `{{tempToken}}`)
  - `role` (required): STUDENT / TEACHER / PARENT (bukan ADMIN)
  - `fullName` (optional): Override nama dari Google
  - `phoneNumber` (optional): Nomor telepon
  - `NIS` (optional): Nomor Induk Siswa
  - `NIP` (optional): Nomor Induk Pegawai
  - `province` (optional): Provinsi
  - `city` (optional): Kota
  - `schoolId` (optional): ID sekolah
  - `schoolName` (optional): Nama sekolah

  ⚠️ `tempToken` expire dalam 10 menit setelah didapat dari Step 2.
