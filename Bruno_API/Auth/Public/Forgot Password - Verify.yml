info:
  name: Forgot Password - Verify
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/auth/forgot-password/verify?token=<FORGOT_PASSWORD_TOKEN>"
  params:
    - name: token
      value: <FORGOT_PASSWORD_TOKEN>
      type: query
      description: Token dari email forgot password
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Forgot password verify berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
        });

        test('Response contains resetToken', function () {
            expect(json.data).to.have.property('resetToken');
        });

        // ✅ Auto-capture resetToken untuk step selanjutnya
        if (json.success && json.data && json.data.resetToken) {
            bru.setVar('resetToken', json.data.resetToken);
            console.log('✅ resetToken tersimpan otomatis! Lanjut ke Reset Password.');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Verifikasi token forgot password dari email.
  Ganti `<FORGOT_PASSWORD_TOKEN>` dengan token dari email.

  **Flow:**
  1. User klik link dari email forgot password
  2. Hit endpoint ini → dapat `resetToken` (JWT, expire 15 menit)
  3. `resetToken` otomatis tersimpan di collection variable
  4. Gunakan di "Reset Password" untuk set password baru

  Token magic link hanya bisa digunakan 1x dan berlaku 15 menit.
