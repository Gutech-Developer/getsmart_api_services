info:
  name: Login
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "guru1@test.com",
        "password": "password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Login berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
            expect(json.message).to.eql('Login berhasil');
        });

        // ✅ Auto-capture tokens ke collection variables
        if (json.success && json.data && json.data.tokens) {
            bru.setVar('accessToken', json.data.tokens.accessToken)
            bru.setVar('refreshToken', json.data.tokens.refreshToken)
            console.log('✅ accessToken & refreshToken tersimpan otomatis!');
            
            if (json.data.user) {
              bru.setVar('currentUserId', json.data.user.id);
              bru.setVar('currentUserEmail', json.data.user.email);
              console.log('✅ userId & userEmail tersimpan: ' + json.data.user.email);
            }
        }

        test('Response contains user data', function () {
            expect(json.data.user).to.have.property('id');
            expect(json.data.user).to.have.property('email');
            expect(json.data.user).to.have.property('role');
        });

        test('Response contains tokens', function () {
            expect(json.data.tokens).to.have.property('accessToken');
            expect(json.data.tokens).to.have.property('refreshToken');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Login dengan email & password.

  **Required fields:** email, password
