info:
  name: Get Current User (Me)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/auth/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
      description: Access token dari register/login
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Get current user berhasil (200)', function () {
            expect(res.getStatus()).to.equal(200);
            expect(json.success).to.be.true;
        });

        test('User data is correct', function () {
            expect(json.data).to.have.property('id');
            expect(json.data).to.have.property('email');
            expect(json.data).to.have.property('role');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Ambil data user yang sedang login.
  Otomatis menggunakan `{{accessToken}}` dari collection variable.

  **Requires:** Bearer token di header Authorization.
