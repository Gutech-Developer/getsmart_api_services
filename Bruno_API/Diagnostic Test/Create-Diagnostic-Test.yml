info:
  name: Create Diagnostic Test (Full)
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/diagnostic-tests"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: json
    data: |-
      {
        "testName": "Tes Diagnostik Matematika - Aljabar Dasar",
        "description": "Tes diagnostik untuk mengukur pemahaman siswa terhadap konsep aljabar dasar kelas 7 MTs.",
        "packages": [
          {
            "packageName": "Paket A - Persamaan Linear",
            "questions": [
              {
                "questionNumber": 1,
                "textQuestion": "Jika 3x + 5 = 20, berapakah nilai x?",
                "pembahasan": "3x + 5 = 20 → 3x = 15 → x = 5",
                "videoUrl": "https://youtube.com/watch?v=aljabar-soal1",
                "options": [
                  { "option": "A", "textAnswer": "3", "isCorrect": false },
                  { "option": "B", "textAnswer": "5", "isCorrect": true },
                  { "option": "C", "textAnswer": "7", "isCorrect": false },
                  { "option": "D", "textAnswer": "10", "isCorrect": false }
                ],
                "discussion": {
                  "textDiscussion": "Langkah penyelesaian:\n1. Pindahkan 5 ke ruas kanan: 3x = 20 - 5 = 15\n2. Bagi kedua ruas dengan 3: x = 15/3 = 5",
                  "videoUrl": "https://youtube.com/watch?v=pembahasan-soal1"
                }
              },
              {
                "questionNumber": 2,
                "textQuestion": "Manakah yang merupakan persamaan linear satu variabel?",
                "pembahasan": "Persamaan linear satu variabel memiliki pangkat tertinggi 1 dan hanya satu variabel.",
                "videoUrl": "https://youtube.com/watch?v=aljabar-soal2",
                "options": [
                  { "option": "A", "textAnswer": "x² + 3 = 0", "isCorrect": false },
                  { "option": "B", "textAnswer": "2x + y = 5", "isCorrect": false },
                  { "option": "C", "textAnswer": "4x - 7 = 13", "isCorrect": true },
                  { "option": "D", "textAnswer": "x³ = 8", "isCorrect": false }
                ],
                "discussion": {
                  "textDiscussion": "4x - 7 = 13 adalah PLSV karena hanya memiliki satu variabel (x) dengan pangkat tertinggi 1."
                }
              },
              {
                "questionNumber": 3,
                "textQuestion": "Hasil dari 2(x + 3) = 14 adalah...",
                "pembahasan": "2(x + 3) = 14 → 2x + 6 = 14 → 2x = 8 → x = 4",
                "videoUrl": "https://youtube.com/watch?v=aljabar-soal3",
                "options": [
                  { "option": "A", "textAnswer": "x = 2", "isCorrect": false },
                  { "option": "B", "textAnswer": "x = 4", "isCorrect": true },
                  { "option": "C", "textAnswer": "x = 5", "isCorrect": false },
                  { "option": "D", "textAnswer": "x = 7", "isCorrect": false }
                ]
              }
            ]
          },
          {
            "packageName": "Paket B - Operasi Hitung Aljabar",
            "questions": [
              {
                "questionNumber": 1,
                "textQuestion": "Sederhanakan: 5x + 3y - 2x + y",
                "pembahasan": "Kelompokkan suku sejenis: (5x - 2x) + (3y + y) = 3x + 4y",
                "videoUrl": "https://youtube.com/watch?v=aljabar-soal4",
                "options": [
                  { "option": "A", "textAnswer": "3x + 4y", "isCorrect": true },
                  { "option": "B", "textAnswer": "7x + 4y", "isCorrect": false },
                  { "option": "C", "textAnswer": "3x + 2y", "isCorrect": false },
                  { "option": "D", "textAnswer": "7xy", "isCorrect": false }
                ],
                "discussion": {
                  "textDiscussion": "Suku sejenis: 5x dan -2x → 3x. Suku sejenis: 3y dan y → 4y. Hasil: 3x + 4y",
                  "videoUrl": "https://youtube.com/watch?v=pembahasan-soal4"
                }
              },
              {
                "questionNumber": 2,
                "textQuestion": "Hasil dari (2x + 3)(x - 1) adalah...",
                "pembahasan": "Gunakan FOIL: 2x·x + 2x·(-1) + 3·x + 3·(-1) = 2x² - 2x + 3x - 3 = 2x² + x - 3",
                "videoUrl": "https://youtube.com/watch?v=aljabar-soal5",
                "options": [
                  { "option": "A", "textAnswer": "2x² + x - 3", "isCorrect": true },
                  { "option": "B", "textAnswer": "2x² - x - 3", "isCorrect": false },
                  { "option": "C", "textAnswer": "2x² + 5x - 3", "isCorrect": false },
                  { "option": "D", "textAnswer": "2x² + x + 3", "isCorrect": false }
                ]
              }
            ]
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();

        test('Create diagnostic test berhasil (201)', function () {
            expect(res.getStatus()).to.equal(201);
            expect(json.success).to.equal(true);
            expect(json.message).to.include('berhasil dibuat');
        });

        test('Response has diagnostic test data', function () {
            expect(json.data).to.have.property('id');
            expect(json.data).to.have.property('testName');
            expect(json.data).to.have.property('teacherId');
        });

        test('Response has nested packages', function () {
            expect(json.data).to.have.property('packages');
            expect(json.data.packages.length).to.be.greaterThan(0);
        });

        // Auto-capture diagnostic test ID
        if (json.data && json.data.id) {
            bru.setEnvVar('diagnosticTestId', json.data.id);
            console.log('✅ diagnosticTestId tersimpan: ' + json.data.id);
        }

        if (json.data && json.data.teacherId) {
            bru.setEnvVar('currentTeacherId', json.data.teacherId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **TEACHER only** — Membuat tes diagnostik lengkap dengan paket soal, soal, opsi jawaban, dan pembahasan.

  **Alur:**
  1. Login sebagai TEACHER terlebih dahulu → accessToken otomatis tersimpan
  2. Hit endpoint ini → diagnostic test + semua nested data dibuat dalam 1 transaction

  **Validasi:**
  - Setiap soal harus memiliki tepat 1 jawaban benar
  - Setiap soal harus memiliki minimal 2 opsi jawaban
  - Opsi jawaban tidak boleh duplikat per soal
  - Soal harus punya textQuestion atau imageQuestionUrl

  **Auto-capture:** `diagnosticTestId`, `currentTeacherId`
