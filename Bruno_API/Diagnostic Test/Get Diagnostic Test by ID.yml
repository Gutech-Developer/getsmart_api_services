info:
  name: Get Diagnostic Test by ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/diagnostic-tests/{{diagnosticTestId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: diagnosticTestId
      value: 31a118d0-1d9f-4449-b624-ed1a35423c6a
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Response has full nested data', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('id');
            expect(json.data).to.have.property('testName');
            expect(json.data).to.have.property('teacher');
            expect(json.data).to.have.property('packages');
        });

        test('Packages contain questions with options', function () {
            const json = res.getBody();
            if (json.data.packages && json.data.packages.length > 0) {
                const pkg = json.data.packages[0];
                expect(pkg).to.have.property('questions');
                if (pkg.questions && pkg.questions.length > 0) {
                    const q = pkg.questions[0];
                    expect(q).to.have.property('options');
                    expect(q.options.length).to.be.greaterThan(0);
                }
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Authenticated** — Mendapatkan detail lengkap tes diagnostik beserta seluruh nested data.

  **Response nested structure:**
  ```
  DiagnosticTest
  ├── teacher { id, fullName, NIP, schoolName }
  └── packages[]
      └── questions[]
          ├── discussion { textDiscussion, videoUrl }
          └── options[] { option, textAnswer, imageAnswerUrl, isCorrect }
  ```

  **Catatan:** Gunakan `{{diagnosticTestId}}` yang auto-captured dari Create.
