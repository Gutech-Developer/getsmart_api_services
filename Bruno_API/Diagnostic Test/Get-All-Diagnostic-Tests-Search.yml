info:
  name: Get All Diagnostic Tests (with Search)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/diagnostic-tests?page=1&limit=10&search=aljabar"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Search results are filtered', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            if (json.data.diagnosticTests.length > 0) {
                json.data.diagnosticTests.forEach(test => {
                    expect(test.testName.toLowerCase()).to.include('aljabar');
                });
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Authenticated** — Cari tes diagnostik berdasarkan nama (case-insensitive).

  Menggunakan query `search=aljabar` untuk filter.
