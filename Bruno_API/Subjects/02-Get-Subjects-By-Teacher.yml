info:
  name: Get Subjects by Teacher
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/subjects/teacher/{{teacherId}}?page=1&limit=10"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Response has subjects and pagination', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('subjects');
            expect(json.data).to.have.property('pagination');
        });

        test('Each subject has eLKPDs array', function () {
            const json = res.getBody();
            if (json.data.subjects.length > 0) {
                expect(json.data.subjects[0]).to.have.property('eLKPDs');
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Authenticated** — Mendapatkan semua materi milik guru tertentu dengan pagination.

  **Path Params:**
  - `teacherId` — UUID guru

  **Query Params:**
  - `page` (default: 1)
  - `limit` (default: 10, max: 50)

  **Response:**
  - `subjects[]` — daftar materi + E-LKPDs terikat
  - `pagination` — metadata halaman
