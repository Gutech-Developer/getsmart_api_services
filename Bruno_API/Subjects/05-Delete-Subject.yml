info:
  name: Delete Subject
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}{{apiPrefix}}/subjects/{{subjectId}}"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Delete confirmed', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Teacher only** — Menghapus materi beserta semua E-LKPD terikat (CASCADE).

  Hanya guru pemilik materi yang dapat menghapusnya.
