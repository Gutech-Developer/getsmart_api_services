info:
  name: Student — Submit E-LKPD
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/subjects/modules/{{courseModuleId}}/elkpd/submit"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: json
    data: |-
      {
        "eLKPDId": "{{elkpdId}}",
        "submissionFileUrl": "https://drive.google.com/file/d/student-submission.pdf"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Returns submission and progress', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('submission');
            expect(json.data).to.have.property('progress');
        });

        test('Submission has submittedAt', function () {
            const json = res.getBody();
            expect(json.data.submission).to.have.property('submittedAt');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Student only** — Mengumpulkan file pengerjaan E-LKPD.

  - Re-submit diperbolehkan: nilai dan catatan guru akan direset.
  - Jika semua E-LKPD pada materi sudah dikumpulkan, `eLKPDSubmittedAt` pada progress diisi.
  - Auto-complete: jika semua syarat terpenuhi, modul otomatis selesai.

  **Body:**
  - `eLKPDId` (required) — UUID E-LKPD yang dikumpulkan (harus milik materi ini)
  - `submissionFileUrl` (required) — URL file jawaban siswa

  **Response:**
  - `submission` — record pengumpulan
  - `progress` — progress terkini siswa pada modul ini
