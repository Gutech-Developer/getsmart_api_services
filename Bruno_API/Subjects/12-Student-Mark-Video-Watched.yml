info:
  name: Student — Mark Video Watched
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/subjects/modules/{{courseModuleId}}/mark-video-watched"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('videoWatchedAt is set', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('videoWatchedAt');
            expect(json.data.videoWatchedAt).to.not.equal(null);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Student only** — Menandai bahwa siswa telah menonton video materi.

  - Akan error 400 jika materi tidak memiliki `videoUrl`.
  - Idempotent: jika sudah ditandai, `videoWatchedAt` tidak berubah.
  - Auto-complete: jika semua syarat terpenuhi, modul ditandai selesai.
