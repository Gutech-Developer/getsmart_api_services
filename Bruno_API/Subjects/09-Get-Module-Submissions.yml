info:
  name: Get Module ELKPD Submissions (Teacher)
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/subjects/modules/{{courseModuleId}}/submissions?page=1&limit=10"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Response has submissions and pagination', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('submissions');
            expect(json.data).to.have.property('pagination');
        });

        test('Each submission has student and eLKPD info', function () {
            const json = res.getBody();
            if (json.data.submissions.length > 0) {
                const s = json.data.submissions[0];
                expect(s).to.have.property('student');
                expect(s).to.have.property('eLKPD');
                expect(s).to.have.property('submittedAt');
            }
        });

        if (res.getStatus() === 200 && res.getBody().data.submissions.length > 0) {
            bru.setVar('submissionId', res.getBody().data.submissions[0].id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Teacher only** — Mendapatkan semua pengumpulan E-LKPD siswa untuk satu course module.

  Hanya guru pemilik materi (via Subject) yang dapat mengaksesnya.

  **Path Params:**
  - `courseModuleId` — UUID course module bertipe SUBJECT

  **Query Params:**
  - `page` (default: 1)
  - `limit` (default: 10, max: 50)

  **Response per submission:**
  - `student` — info siswa (id, fullName)
  - `eLKPD` — judul E-LKPD yang dikumpulkan
  - `submissionFileUrl`, `score`, `teacherNote`, `submittedAt`, `gradedAt`
