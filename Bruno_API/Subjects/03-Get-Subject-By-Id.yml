info:
  name: Get Subject by ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/subjects/{{subjectId}}"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Response has subject detail with eLKPDs', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('id');
            expect(json.data).to.have.property('subjectName');
            expect(json.data).to.have.property('eLKPDs');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Authenticated** — Mendapatkan detail satu materi beserta semua E-LKPD-nya.

  **Path Params:**
  - `subjectId` — UUID materi (gunakan variabel `{{subjectId}}`)
