info:
  name: Student — Get Module Progress
  type: http
  seq: 14

http:
  method: GET
  url: "{{baseUrl}}{{apiPrefix}}/subjects/modules/{{courseModuleId}}/progress"
  headers:
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: none
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 200', function () {
            expect(res.getStatus()).to.equal(200);
        });

        test('Returns progress and submissions', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('progress');
            expect(json.data).to.have.property('submissions');
        });

        test('Progress has completion fields', function () {
            const json = res.getBody();
            if (json.data.progress) {
                const p = json.data.progress;
                expect(p).to.have.property('fileReadAt');
                expect(p).to.have.property('videoWatchedAt');
                expect(p).to.have.property('eLKPDSubmittedAt');
                expect(p).to.have.property('isCompleted');
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Student only** — Mendapatkan progress siswa (yang sedang login) pada satu course module SUBJECT.

  **Response:**
  - `progress` — objek `StudentModuleProgress`:
    - `fileReadAt` — kapan file dibaca (null jika belum)
    - `videoWatchedAt` — kapan video ditonton (null jika belum / tidak ada video)
    - `eLKPDSubmittedAt` — kapan semua E-LKPD dikumpulkan (null jika belum)
    - `isCompleted` — apakah modul sudah selesai
    - `completedAt` — timestamp selesai
  - `submissions[]` — semua pengumpulan E-LKPD beserta status penilaian guru
