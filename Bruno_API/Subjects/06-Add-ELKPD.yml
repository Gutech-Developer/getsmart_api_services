info:
  name: Add E-LKPD to Subject
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}{{apiPrefix}}/subjects/{{subjectId}}/elkpd"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "Bearer {{accessToken}}"
  body:
    type: json
    data: |-
      {
        "title": "Lembar Kerja Lanjutan — Persamaan Linear",
        "description": "E-LKPD tambahan untuk pendalaman materi persamaan linear.",
        "fileUrl": "https://drive.google.com/file/d/elkpd-persamaan.pdf"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Status is 201', function () {
            expect(res.getStatus()).to.equal(201);
        });

        test('ELKPD created', function () {
            const json = res.getBody();
            expect(json.success).to.equal(true);
            expect(json.data).to.have.property('id');
            expect(json.data).to.have.property('title');
            expect(json.data).to.have.property('subjectId');
        });

        if (res.getStatus() === 201) {
            bru.setVar('elkpdId', res.getBody().data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  🔒 **Teacher only** — Menambahkan E-LKPD baru ke materi yang sudah ada.

  Berguna ketika E-LKPD tidak disiapkan saat pembuatan materi.

  **Body:**
  - `title` (required)
  - `description` (optional)
  - `fileUrl` (required) — URL file E-LKPD
